<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кодомандри | Scratch Learning</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .bounce-animation {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center p-4">

    <div class="hero-card max-w-lg w-full p-8 text-center relative overflow-hidden">
        <!-- Decorative blob -->
        <div
            class="absolute -top-16 -right-16 w-32 h-32 bg-yellow-300 rounded-full mix-blend-multiply filter blur-xl opacity-70">
        </div>
        <div
            class="absolute -bottom-16 -left-16 w-32 h-32 bg-orange-300 rounded-full mix-blend-multiply filter blur-xl opacity-70">
        </div>

        <div class="relative z-10">
            <div class="text-6xl mb-4 bounce-animation">🐈</div>

            <h1 class="text-4xl font-extrabold text-gray-800 mb-2">Кодомандри</h1>
            <p class="text-lg text-gray-600 mb-8 font-semibold">Навчись програмувати граючи!</p>

            <div class="space-y-4 text-left bg-orange-50 p-4 rounded-xl mb-8">
                <p class="flex items-center text-gray-700">
                    <span class="text-xl mr-3">🎮</span> Вирішуй логічні задачі
                </p>
                <p class="flex items-center text-gray-700">
                    <span class="text-xl mr-3">🧩</span> Складай програми з блоків
                </p>
                <p class="flex items-center text-gray-700">
                    <span class="text-xl mr-3">⭐</span> Отримуй нову місію щодня
                </p>
            </div>

            <div id="action-container">
                <!-- Buttons will be injected here via JS -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const actionContainer = document.getElementById('action-container');
            const botUrl = 'https://t.me/scratch_learning_test_bot?start=1'; // Replace with the actual bot username

            // Check if user already has a UID in localStorage
            let existingUid = null;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('reg_')) {
                    existingUid = key.replace('reg_', '');
                    break;
                }
            }

            if (existingUid) {
                // User is already registered
                actionContainer.innerHTML = `
                    <div class="mb-4 text-green-600 font-bold">Раді бачити тебе знову! 🚀</div>
                    <a href="/app/progress.html?uid=${existingUid}" class="inline-block w-full py-4 text-xl font-bold text-white bg-gradient-to-r from-green-400 to-green-600 rounded-xl hover:from-green-500 hover:to-green-700 transition-all transform hover:scale-105 shadow-lg">
                        Продовжити гру
                    </a>
                `;
            } else {
                // New user
                actionContainer.innerHTML = `
                    <a href="${botUrl}" target="_blank" class="inline-block w-full py-4 text-xl font-bold text-white bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl hover:from-blue-600 hover:to-purple-700 transition-all transform hover:scale-105 shadow-lg mb-3">
                        Почати пригоду у Telegram
                    </a>
                    <p class="text-sm text-gray-500 mt-2">Реєстрація проходить через нашого Telegram-бота.</p>
                `;
            }
        });
    </script>
</body>

</html>
