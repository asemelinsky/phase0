<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта пригод — Кодомандри</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #f43f5e;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #10b981;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(244, 63, 94, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        header {
            max-width: 1000px;
            margin: 0 auto 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(135deg, #818cf8, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .stat-value {
            font-family: 'Outfit';
            font-weight: 800;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .map-grid {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .level-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 2px solid var(--glass-border);
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .level-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .level-card.locked:hover {
            transform: none;
            border-color: var(--glass-border);
        }

        .level-num {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .level-title {
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-done {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent);
        }

        .status-current {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            animation: pulse 2s infinite;
        }

        .status-locked {
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #64748b;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(99, 102, 241, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
            }
        }

        .lock-icon {
            font-size: 1.5rem;
            margin-top: 0.5rem;
        }

        .progress-container {
            max-width: 1000px;
            margin: 0 auto 2rem;
            background: rgba(255, 255, 255, 0.05);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 1s ease;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            header {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                margin-bottom: 1.5rem;
            }

            .logo {
                font-size: 1.5rem;
            }

            .stats {
                width: 100%;
                justify-content: center;
            }

            .stat-card {
                flex: 1;
            }

            .map-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.75rem;
            }

            .level-card {
                padding: 1rem;
            }

            .level-title {
                font-size: 0.95rem;
            }
        }
</style>
</head>

<body>
    <header>
        <div class="logo">🚀 Кодомандри</div>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="streakVal">0</div>
                <div style="font-size: 0.7rem; opacity: 0.6;">ДНІВ ПІДРЯД</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="doneVal">0/30</div>
                <div style="font-size: 0.7rem; opacity: 0.6;">ЗАВЕРШЕНО</div>
            </div>
        </div>
    </header>

    <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="map-grid" id="mapGrid">
        <!-- Generated by JS -->
    </div>

    <script>
        const uid = new URLSearchParams(window.location.search).get('uid') || localStorage.getItem('last_uid') || 'guest';
        if (uid) localStorage.setItem('last_uid', uid);

        async function init() {
            const response = await fetch('../data/tasks.json');
            const tasks = await response.json();

            const progress = JSON.parse(localStorage.getItem(`progress_${uid}`) || '{"completedTasks":[], "streak":0}');
            const regDate = localStorage.getItem(`reg_${uid}`);

            // Logic for Task of the Day
            let currentDayIdx = 0;
            if (regDate) {
                const diff = Math.abs(Date.now() - new Date(regDate));
                currentDayIdx = Math.floor(diff / (1000 * 60 * 60 * 24));
            }

            // Update Header Stats
            document.getElementById('streakVal').textContent = progress.streak;
            document.getElementById('doneVal').textContent = `${progress.completedTasks.length}/${tasks.length}`;
            document.getElementById('progressFill').style.width = `${(progress.completedTasks.length / tasks.length) * 100}%`;

            const grid = document.getElementById('mapGrid');

            tasks.forEach((task, index) => {
                const isDone = progress.completedTasks.includes(task.id);
                const isCurrent = (index === currentDayIdx);

                // Дозволяємо доступ до всіх завдань для тестування (якщо uid === 'test_user')
                const isLocked = uid === 'test_user' ? false : (index > currentDayIdx) && !isDone;

                const card = document.createElement('div');
                card.className = `level-card ${isLocked ? 'locked' : ''}`;

                let badge = '';
                if (isDone) badge = '<span class="status-badge status-done">ВИКОНАНО ✅</span>';
                else if (isCurrent) badge = '<span class="status-badge status-current">ЗАВЗДАННЯ ДНЯ 🔥</span>';
                else if (isLocked) badge = '<div class="lock-icon">🔒</div>';
                else badge = '<span class="status-badge status-locked">МОЖНА ПОВТОРИТИ</span>';

                card.innerHTML = `
                    <div class="level-num">ЗАВДАННЯ ${index + 1}</div>
                    <div class="level-title">${task.title}</div>
                    ${badge}
                `;

                if (!isLocked) {
                    card.onclick = () => {
                        window.location.href = `task.html?uid=${uid}&task=${task.id}`;
                    };
                }

                grid.appendChild(card);
            });
        }

        init();
    </script>
</body>

</html>
