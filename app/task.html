<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кодомандри — Завдання дня</title>
    <!-- Blockly Library -->
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="task.css">
    <link rel="stylesheet" href="animations/intro_overlay.css">
    <link rel="stylesheet" href="animations/task_tour.css">
</head>

<body>
    <header>
        <a class="logo" id="logoLink" href="progress.html">
            <span class="logo-text visible" id="logoMain">🚀 Кодомандри</span>
            <span class="logo-cta hidden" id="logoCta">👆 Твій прогрес тут</span>
        </a>
        <div class="task-info">
            <div class="day-badge" id="dayLabel">День 1</div>
            <div class="task-title" id="taskTitle">Завантаження...</div>
        </div>
        <div class="user-streak" id="streakLabel">🔥 0 днів</div>
        <div class="user-streak" id="starsLabel">⭐ 0</div>
        <a href="progress.html" id="avatarBubble" title="Профіль" style="width:36px;height:36px;border-radius:50%;background:rgba(99,102,241,0.15);border:2px solid rgba(99,102,241,0.35);display:flex;align-items:center;justify-content:center;font-size:1.2rem;text-decoration:none;transition:all 0.2s;flex-shrink:0;">👤</a>
    </header>

    <main>
        <div class="hint-card">
            <div class="hint-avatar">🤖</div>
            <div class="hint-text" id="hintBox">
                Привіт! Я Скретчик. Давай почнемо програмувати разом!
            </div>
        </div>

        <div id="blocklyArea">
            <div id="blocklyDiv"></div>
            <div id="saveBar">
                <button class="btn-save-action" onclick="manualSave()">💾 Зберегти</button>
                <button class="btn-save-action" onclick="manualLoad()">📂 Завантажити</button>
            </div>
            <div id="introOverlay">
                <div class="intro-text" id="introText"></div>
                <button class="btn-run" id="introOk" style="font-size:0.95rem;padding:0.6rem 1.8rem">Зрозумів! 👍</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="preview-panel">
                <button id="themeToggle" title="Світло/Темно" onclick="toggleCanvasTheme()" style="position:absolute;top:0.5rem;right:0.5rem;background:rgba(0,0,0,0.3);border:none;border-radius:50%;width:2rem;height:2rem;cursor:pointer;font-size:1rem;z-index:10;">🌙</button>
                <canvas id="gameCanvas"></canvas>
                <div class="success-overlay" id="successOverlay">
                    <div class="success-icon">🎉</div>
                    <h2 style="font-family: 'Outfit'; margin-bottom: 0.5rem;">Чудово!</h2>
                    <p id="successMessage">Ти виконав завдання дня!</p>
                    <button class="btn-run" id="nextBtn" style="margin-top: 1.5rem;">Наступне завдання</button>
                </div>
                <div class="controls">
                    <button class="btn-run" id="runBtn">🚩 Запустити</button>
                </div>
                <div id="adminPanel" style="display:none;padding:0.5rem;gap:0.4rem;flex-wrap:wrap;background:rgba(0,0,0,0.4);border-radius:0.5rem;margin-top:0.4rem;">
                    <button onclick="exportWorkspace()" style="font-size:0.75rem;padding:0.3rem 0.6rem;border:1px solid #888;border-radius:0.4rem;background:#333;color:#fff;cursor:pointer;">📋 Копіювати XML</button>
                    <button onclick="importWorkspace()" style="font-size:0.75rem;padding:0.3rem 0.6rem;border:1px solid #888;border-radius:0.4rem;background:#333;color:#fff;cursor:pointer;">📥 Вставити XML</button>
                    <button onclick="clearSavedWorkspace()" style="font-size:0.75rem;padding:0.3rem 0.6rem;border:1px solid #f43f5e;border-radius:0.4rem;background:#333;color:#f43f5e;cursor:pointer;">🗑️ Скинути</button>
                </div>
            </div>
        </div>
    </main>

    <div id="saveToast">Збережено ✓</div>

    <!-- Mobile task announcement modal -->
    <div id="mobileTaskModal">
        <div class="mtm-box">
            <div class="mtm-emoji" id="mtmEmoji">👾</div>
            <div class="mtm-title" id="mtmTitle"></div>
            <div class="mtm-text" id="mtmText"></div>
            <button class="btn-run" id="mtmOk">Зрозумів! 👍</button>
        </div>
    </div>

    <div id="resumeOverlay">
        <div class="resume-box">
            <h3>💾 Є збережений код</h3>
            <p>Продовжити з того місця, де зупинився?</p>
            <div class="resume-buttons">
                <button class="btn-resume-yes" onclick="resumeYes()">Так</button>
                <button class="btn-resume-no" onclick="resumeNo()">Почати заново</button>
            </div>
        </div>
    </div>

    <!-- СКРЕТЧИК FAB -->
    <div class="scratchy-fab" id="scratchyFab">
        <div class="scratchy-tooltip" id="fabTooltip">Натисни мене! 👆</div>
        <button class="fab-btn" id="btnFact"     data-action="fact"     title="Цікавий факт">💡<span class="fab-label">Цікавий факт</span></button>
        <button class="fab-btn" id="btnJoke"     data-action="joke"     title="Анекдот">😄<span class="fab-label">Анекдот</span></button>
        <button class="fab-btn" id="btnHelp"     data-action="help"     title="Допомога">❓<span class="fab-label">Допомога</span></button>
        <button class="fab-btn" id="btnQuestion" data-action="question" title="Задай питання">🎤<span class="fab-label">Задай питання</span></button>
        <button class="scratchy-avatar" id="fabAvatar" onclick="toggleFab()">🤖</button>
    </div>
    <div class="mic-indicator" id="micIndicator">🎤 Слухаю...</div>

    <!-- Custom Blockly number prompt modal -->
    <div id="blocklyPromptOverlay">
        <div class="bp-box">
            <div class="bp-title">Потрібна дія</div>
            <div class="bp-msg" id="bpMsg"></div>
            <input type="number" class="bp-input" id="bpInput">
            <div class="bp-btns">
                <button class="btn-run" id="bpCancel" style="background:#475569;font-size:0.9rem;padding:0.5rem 1rem">Скасувати</button>
                <button class="btn-run" id="bpOk" style="font-size:0.9rem;padding:0.5rem 1rem">OK</button>
            </div>
        </div>
    </div>

    <script src="tts.js"></script>
    <script src="stt.js"></script>
    <script src="animations/engine.js"></script>
    <script src="animations/intro_overlay.js"></script>
    <script src="animations/task_tour.js"></script>
    <script src="task.js"></script>

</body>

</html>
